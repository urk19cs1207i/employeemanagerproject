{% extends 'app1/base.html' %}

{% block body_block %}

<div class="job-table-container">
    <table class="job-table">
        <tr>
            <th>Role</th>
            <th>Exp</th>
            <th>Skills</th>
            <th>C CTC</th>
            <th>Notice Period</th>
        </tr>
        {% for i in d %}
        <tr>
            <td>{{i.job}}</td>
            <td>{{i.experience}}</td>
            <td>{{i.skill}}</td>
            <td>{{i.currentctc}}</td>
            <td>{{i.noticeperiod}}</td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
