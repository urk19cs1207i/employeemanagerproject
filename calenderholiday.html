{% extends 'app1/base.html' %}

{% block body_block %}

<h1 class="calendar-title">Holidays</h1>

    <table class="holiday-table">
    <tr>
        <th>Date</th>
        <th>Occasion</th>
    </tr>
    {% for i in d %}
    <tr>
        <td>{{i.date}}</td>
        <td>{{i.occasion}}</td>
    </tr>
    {% endfor %}
</table>


{% endblock %}
